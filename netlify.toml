[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["node-fetch"]
  included_files = ["netlify/functions/package.json"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
